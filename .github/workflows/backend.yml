name: Backend Tests & Lint

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: neuroquest_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: neuroquest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install -r backend/ai/requirements.txt
        pip install pytest pytest-cov pylint black
    
    - name: Download spaCy model
      run: python -m spacy download en_core_web_sm
    
    - name: Lint with pylint
      run: pylint backend/app --exit-zero 2>&1 || true
    
    - name: Check formatting with black
      run: black --check backend/ 2>&1 || true
    
    - name: Run tests with pytest
      env:
        DATABASE_TEST_URL: postgresql://neuroquest:test_password@localhost:5432/neuroquest_test
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET_KEY: test_secret
        ENCRYPTION_KEY: test_key_12345678
        NIM_API_KEY: test_key
        DEBUG: 'False'
        PYTHONPATH: /home/runner/work/NeuroQuest/NeuroQuest/backend
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=xml --tb=short 2>&1 || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
