version: '3.8'

# Development override with hot reload and debugging
services:
  backend:
    volumes:
      - ../backend:/app
      - ai_data:/app/ai/data
    environment:
      DEBUG: "True"
      ENVIRONMENT: development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: builder
    command: npm run dev
    ports:
      - "3000:3000"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
