version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: neuroquest-postgres
    environment:
      POSTGRES_DB: neuroquest
      POSTGRES_USER: neuroquest
      POSTGRES_PASSWORD: neuroquest_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroquest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuroquest-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: neuroquest-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuroquest-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: neuroquest-backend
    environment:
      DATABASE_URL: postgresql://neuroquest:neuroquest_password@postgres:5432/neuroquest
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: http://localhost:3000,http://localhost:80
    volumes:
      - ../backend:/app
      - ai_data:/app/ai/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - neuroquest-network

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: neuroquest-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - neuroquest-network

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: neuroquest-celery-worker
    command: celery -A app.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://neuroquest:neuroquest_password@postgres:5432/neuroquest
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ../backend:/app
      - ai_data:/app/ai/data
    depends_on:
      - postgres
      - redis
    networks:
      - neuroquest-network

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: neuroquest-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://neuroquest:neuroquest_password@postgres:5432/neuroquest
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    volumes:
      - ../backend:/app
    depends_on:
      - redis
    networks:
      - neuroquest-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_data:
    driver: local

networks:
  neuroquest-network:
    driver: bridge
